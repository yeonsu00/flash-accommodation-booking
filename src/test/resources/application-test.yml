spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2

  datasource:
    url: jdbc:h2:mem:flash_booking_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

resilience4j:
  retry:
    instances:
      pg-api:
        max-attempts: 3
        wait-duration: 10ms
        retry-exceptions:
          - com.flashaccommodationbooking.global.exception.PgNetworkException
        ignore-exceptions:
          - com.flashaccommodationbooking.global.exception.BusinessException
  circuit-breaker:
    instances:
      pg-api:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 200ms
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 1
        ignore-exceptions:
          - com.flashaccommodationbooking.global.exception.BusinessException
      redis:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 200ms
        sliding-window-size: 5
        minimum-number-of-calls: 3
        permitted-number-of-calls-in-half-open-state: 2
